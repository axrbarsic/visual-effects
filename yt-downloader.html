<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Media Downloader</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #1a102f 0%, #050508 100%);
            --card-bg: rgba(20, 20, 35, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #ff2a5f;
            --accent-secondary: #7000ff;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --input-bg: rgba(10, 10, 18, 0.6);
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 540px;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 28px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 18px;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(255, 42, 95, 0.3);
        }

        .logo-container svg {
            width: 32px;
            height: 32px;
            fill: #fff;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .url-input {
            width: 100%;
            background: var(--input-bg);
            border: 1.5px solid var(--card-border);
            border-radius: 16px;
            padding: 16px 110px 16px 18px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.25s ease;
        }

        .url-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(255, 42, 95, 0.15);
        }

        .paste-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .paste-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper select {
            width: 100%;
            background: var(--input-bg);
            border: 1.5px solid var(--card-border);
            border-radius: 14px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            appearance: none;
            outline: none;
            cursor: pointer;
        }

        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            color: var(--text-muted);
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Preview Area */
        .preview-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 14px;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        .preview-thumb {
            width: 120px;
            height: 68px;
            border-radius: 10px;
            object-fit: cover;
            background: #111;
        }

        .preview-info {
            flex: 1;
            min-width: 0;
        }

        .preview-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .preview-author {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Action Button */
        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 16px;
            padding: 16px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(112, 0, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(112, 0, 255, 0.45);
        }

        .action-btn:active {
            transform: translateY(1px);
        }

        .action-btn:disabled {
            background: #2a2a35;
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* States & Feedback */
        .status-box {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
            animation: slideUp 0.25s ease;
        }

        .status-box.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
            display: block;
        }

        .status-box.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
            display: block;
        }

        .status-box.loading {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            display: block;
        }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        /* Disclaimer */
        .disclaimer {
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 24px;
            line-height: 1.5;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Utility classes */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo-container">
                    <svg viewBox="0 0 24 24">
                        <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
                    </svg>
                </div>
                <h1>Media Downloader</h1>
                <p class="subtitle">Download your favorite YouTube videos instantly</p>
            </div>

            <!-- Input area -->
            <div class="input-group">
                <input type="text" id="url-input" class="url-input" placeholder="Paste YouTube link here..." autocomplete="off" spellcheck="false">
                <button type="button" id="paste-btn" class="paste-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    Paste
                </button>
            </div>

            <!-- Configuration Options -->
            <div class="options-grid">
                <div class="select-wrapper">
                    <select id="download-mode">
                        <option value="video">Video (MP4)</option>
                        <option value="audio">Audio (MP3)</option>
                    </select>
                </div>
                <div class="select-wrapper">
                    <select id="quality-select">
                        <option value="1080">1080p (Full HD)</option>
                        <option value="720" selected>720p (HD)</option>
                        <option value="480">480p (SD)</option>
                        <option value="360">360p</option>
                    </select>
                </div>
            </div>

            <!-- Dynamic Metadata Preview -->
            <div id="preview-container" class="preview-box hidden">
                <img id="preview-image" class="preview-thumb" src="" alt="Thumbnail">
                <div class="preview-info">
                    <div id="preview-title" class="preview-title">Loading video details...</div>
                    <div id="preview-author" class="preview-author">YouTube Video</div>
                </div>
            </div>

            <!-- Action Trigger -->
            <button id="download-btn" class="action-btn">
                <span>Generate Download Link</span>
            </button>

            <!-- Status Alerts -->
            <div id="status-message" class="status-box"></div>
        </div>

        <div class="disclaimer">
            This tool is for educational and personal use only. Please respect creators' copyright. Powered by Cobalt API.
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url-input');
        const pasteBtn = document.getElementById('paste-btn');
        const downloadMode = document.getElementById('download-mode');
        const qualitySelect = document.getElementById('quality-select');
        const previewContainer = document.getElementById('preview-container');
        const previewImage = document.getElementById('preview-image');
        const previewTitle = document.getElementById('preview-title');
        const previewAuthor = document.getElementById('preview-author');
        const downloadBtn = document.getElementById('download-btn');
        const statusMessage = document.getElementById('status-message');

        // Cobalt endpoints and fallback lists
        const COBALT_INSTANCES = [
            'https://api.cobalt.tools/api/json',
            'https://cobalt.api.ryb.sh/api/json',
            'https://co.wuk.sh/api/json'
        ];

        // Toggle Quality dropdown based on download mode
        downloadMode.addEventListener('change', () => {
            if (downloadMode.value === 'audio') {
                qualitySelect.disabled = true;
                qualitySelect.parentElement.style.opacity = '0.5';
            } else {
                qualitySelect.disabled = false;
                qualitySelect.parentElement.style.opacity = '1';
            }
        });

        // Paste functionality
        pasteBtn.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                urlInput.value = text;
                handleUrlChange();
            } catch (err) {
                showStatus('Could not access clipboard. Please paste manually.', 'error');
            }
        });

        // Auto-detect input changes
        urlInput.addEventListener('input', handleUrlChange);
        urlInput.addEventListener('change', handleUrlChange);

        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function handleUrlChange() {
            const url = urlInput.value.trim();
            const videoId = getYouTubeId(url);

            if (!videoId) {
                previewContainer.classList.add('hidden');
                return;
            }

            // Instantly show default preview assets to remain highly responsive
            previewImage.src = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
            previewTitle.textContent = "Fetching video title...";
            previewAuthor.textContent = "YouTube Video";
            previewContainer.classList.remove('hidden');

            // Fetch actual metadata from YouTube oEmbed safely
            try {
                const oEmbedUrl = `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`;
                const response = await fetch(oEmbedUrl);
                if (response.ok) {
                    const data = await response.json();
                    previewTitle.textContent = data.title;
                    previewAuthor.textContent = data.author_name;
                } else {
                    previewTitle.textContent = "YouTube Video Ready";
                }
            } catch (e) {
                previewTitle.textContent = "YouTube Video Ready";
            }
        }

        // Main Download Handler
        downloadBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) {
                showStatus('Please enter a valid YouTube URL first.', 'error');
                return;
            }

            setLoadingState(true);
            showStatus('Contacting download server...', 'loading');

            const mode = downloadMode.value;
            const quality = qualitySelect.value;

            // Prepare Cobalt payload
            const payload = {
                url: url,
                filenameStyle: 'pretty'
            };

            if (mode === 'audio') {
                payload.downloadMode = 'audio';
                payload.audioFormat = 'mp3';
            } else {
                payload.downloadMode = 'video';
                payload.videoQuality = quality;
            }

            let success = false;

            // Attempt fetching from available instances sequentially
            for (const instance of COBALT_INSTANCES) {
                try {
                    const response = await fetch(instance, {
                        method: 'POST',
                        mode: 'cors',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) continue;

                    const data = await response.json();

                    if (data.status === 'redirect' || data.status === 'tunnel' || data.status === 'stream') {
                        showStatus('Download ready! Opening file link...', 'success');
                        window.open(data.url, '_blank');
                        success = true;
                        break;
                    } else if (data.status === 'error') {
                        showStatus(`Server Message: ${data.text || 'Process failed'}`, 'error');
                        setLoadingState(false);
                        return;
                    }
                } catch (err) {
                    console.warn(`Instance failed: ${instance}`, err);
                }
            }

            if (!success) {
                showStatus('Service temporarily busy. Please try again or try another format.', 'error');
            }
            setLoadingState(false);
        });

        function showStatus(message, type) {
            statusMessage.className = `status-box ${type}`;
            if (type === 'loading') {
                statusMessage.innerHTML = `<span class="spinner" style="vertical-align: middle; margin-right: 8px;"></span> ${message}`;
            } else {
                statusMessage.textContent = message;
            }
        }

        function setLoadingState(isLoading) {
            downloadBtn.disabled = isLoading;
            const btnText = downloadBtn.querySelector('span');
            if (isLoading) {
                btnText.textContent = 'Processing request...';
            } else {
                btnText.textContent = 'Generate Download Link';
            }
        }
    </script>
</body>
</html>
